<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TextileERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <!-- Decorative elements -->
  <div style="position:absolute;top:60px;left:60px;width:200px;height:200px;border-radius:50%;border:1px solid rgba(255,255,255,0.05);"></div>
  <div style="position:absolute;bottom:80px;right:80px;width:300px;height:300px;border-radius:50%;border:1px solid rgba(255,255,255,0.04);"></div>

  <div class="login-card">
    <div class="login-logo"><i class="fas fa-store"></i></div>
    <div class="login-title">TextileERP</div>
    <div class="login-sub">Showroom Management System</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'danger' else 'info' }} py-2 px-3 mb-3 rounded-3" style="font-size:13.5px;">
        <i class="fas fa-{{ 'exclamation-circle' if category == 'danger' else 'info-circle' }} me-2"></i>{{ message }}
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-600" style="font-size:13px;font-weight:600;">Username</label>
        <div class="input-group" style="position:relative;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8896a4;z-index:2;font-size:14px;">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" name="username" class="form-control"
                 style="padding-left:40px;border:1.5px solid #e8edf2;border-radius:12px;padding-top:12px;padding-bottom:12px;font-size:14px;"
                 placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600" style="font-size:13px;font-weight:600;">Password</label>
        <div style="position:relative;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8896a4;z-index:2;font-size:14px;">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" name="password" id="passwordInput" class="form-control"
                 style="padding-left:40px;padding-right:44px;border:1.5px solid #e8edf2;border-radius:12px;padding-top:12px;padding-bottom:12px;font-size:14px;"
                 placeholder="Enter password" required>
          <button type="button" onclick="togglePass()"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8896a4;cursor:pointer;">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="demo-creds">
      <div class="mb-1"><i class="fas fa-info-circle me-1" style="color:#e94560;"></i><strong>Demo Credentials</strong></div>
      <div><strong>Admin:</strong> admin / admin123</div>
      <div><strong>Staff:</strong> staff1 / staff123</div>
    </div>
  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
